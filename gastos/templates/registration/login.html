<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | ObraGastos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #1e293b; /* El mismo azul oscuro de tu Sidebar */
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-login {
            width: 100%;
            max-width: 400px;
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .card-header-custom {
            background: white;
            padding-top: 3rem;
            padding-bottom: 1rem;
            text-align: center;
            border: none;
        }

        .form-control {
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            background-color: #f8fafc;
            font-size: 0.95rem;
        }

        .form-control:focus {
            background-color: #fff;
            border-color: #0d6efd;
            box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.1);
        }

        .input-group-text {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-right: none;
            border-radius: 8px 0 0 8px;
            color: #64748b;
        }
        
        /* Ajuste para que el input pegado al icono no tenga borde izquierdo */
        .input-group .form-control {
            border-left: none;
            border-radius: 0 8px 8px 0;
        }

        .btn-login {
            padding: 12px;
            font-weight: 600;
            border-radius: 8px;
            background-color: #0d6efd;
            border: none;
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            background-color: #0b5ed7;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(13, 110, 253, 0.2);
        }
    </style>
</head>
<body>

    <div class="container px-4">
        <div class="card card-login mx-auto bg-white">
            
            <div class="card-header-custom">
                <div class="mb-3">
                    <span class="bg-primary bg-opacity-10 text-primary p-3 rounded-circle d-inline-block">
                        <i class="bi bi-building-fill-gear fs-1"></i>
                    </span>
                </div>
                <h4 class="fw-bold text-dark mb-1">Bienvenido</h4>
                <p class="text-muted small">Ingresa a tu cuenta de ObraGastos</p>
            </div>

            <div class="card-body p-4 pt-2">
                
                {% if form.errors %}
                    <div class="alert alert-danger d-flex align-items-center small py-2 mb-3" role="alert">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i>
                        <div>Usuario o contraseña incorrectos.</div>
                    </div>
                {% endif %}

                <form method="post" action="{% url 'login' %}">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted text-uppercase">Usuario</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" name="username" class="form-control" placeholder="Ej: admin" required autofocus>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label small fw-bold text-muted text-uppercase">Contraseña</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                        </div>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-login text-white">
                            Iniciar Sesión <i class="bi bi-arrow-right-short ms-1"></i>
                        </button>
                    </div>

                </form>
            </div>
            
            <div class="card-footer bg-light text-center py-3 border-0">
                <p class="small text-muted mb-0">
                    &copy; 2026 Gastos de Obra System
                </p>
            </div>
        </div>
    </div>

</body>
</html>
